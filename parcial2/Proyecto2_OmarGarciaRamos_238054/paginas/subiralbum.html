<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Álbum</title>
    <link rel="stylesheet" href="../css/estilo.css">
</head>
<body class="sinflex">

    <div class="titulonewbaby">Melodify</div>

    <div class="contenidodecadenciamental">

        <!-- nav -->
        <div class="navdecadencia">
            <a class="eunicio" href="paginaprincipal.html">Regresar a inicio</a>
            
            <!-- foto usuario -->
            <button class="cuenta" onclick="irCuenta()">
                <img id="fotoUsuario" src="" alt="">
            </button>
        </div>

        <div class="lineadivisoria"></div>

        <!-- formulario album -->
        <form id="formularioAlbum">

            <div class="cuadroinvis"></div>   

            <div class="hilarypelona">Ingresa el nombre del album</div>
            <input class="input-album" type="text" name="namealbum" required />

            <div class="hilarypelona">Ingresa descripcion del album</div>
            <input class="input-album" type="text" name="descalbum" required />

            <!-- boton imagen -->
            <button type="button" class="hilarypelona2" id="btnPortada">
                Selecciona portada del álbum
            </button>

            <!-- input oculto imagen -->
            <input type="file" id="inputPortada" accept="image/*" style="display:none" required />

            <!-- preview -->
            <div id="previsualizacionPortada"></div>

            <!-- guardar -->
            <button type="submit" class="hilarypelona2">Subir</button>
        </form>

    </div>

    <!-- scripts -->
    <script type="module" src="../js/ircuenta.js"></script>
    <script type="module" src="../js/mostrarAlbumes.js"></script>

</body>
</html>
